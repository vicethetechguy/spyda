<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spyda Demo Recorder</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #050506;
      }

      canvas {
        width: min(100vw, 1280px);
        height: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="demoCanvas" width="1280" height="720"></canvas>
    <script>
      window.createSpydaDemo = async function createSpydaDemo() {
        const canvas = document.querySelector("#demoCanvas");
        const ctx = canvas.getContext("2d");
        const width = canvas.width;
        const height = canvas.height;
        const stream = canvas.captureStream(24);
        const recorder = new MediaRecorder(stream, {
          mimeType: "video/webm;codecs=vp9",
          videoBitsPerSecond: 2400000,
        });
        const chunks = [];
        const duration = 9.2;

        recorder.ondataavailable = (event) => {
          if (event.data.size) chunks.push(event.data);
        };

        const ease = (value) => {
          const p = Math.max(0, Math.min(1, value));
          return 1 - Math.pow(1 - p, 3);
        };
        const appear = (time, start, durationMs = 0.7) => ease((time - start) / durationMs);
        const lerp = (a, b, p) => a + (b - a) * p;

        const roundedRect = (x, y, w, h, r) => {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        };

        const fillRound = (x, y, w, h, r, fill, stroke = "") => {
          roundedRect(x, y, w, h, r);
          ctx.fillStyle = fill;
          ctx.fill();
          if (stroke) {
            ctx.strokeStyle = stroke;
            ctx.lineWidth = 1.4;
            ctx.stroke();
          }
        };

        const drawText = (text, x, y, size, color = "#fbfbf7", weight = "700", family = "Montserrat") => {
          ctx.font = `${weight} ${size}px ${family}, Arial, sans-serif`;
          ctx.fillStyle = color;
          ctx.fillText(text, x, y);
        };

        const nodeData = [
          { label: "Hero text", sub: "Editable headline", zone: "Top", x: 856, y: 118, fill: "#4b4949", color: "#ffffff", start: 2.2 },
          { label: "Image layer", sub: "Upload subject", zone: "Middle", x: 936, y: 280, fill: "#9dfab0", color: "#07110a", start: 2.65 },
          { label: "Brand Card", sub: "Fonts + colors", zone: "Brand", x: 782, y: 462, fill: "#ffffff", color: "#111827", start: 3.1 },
          { label: "CTA block", sub: "Contact action", zone: "Bottom", x: 994, y: 514, fill: "#ffffff", color: "#111827", start: 3.55 },
        ];

        let startTime = 0;

        const drawFrame = (now) => {
          const time = (now - startTime) / 1000;
          ctx.clearRect(0, 0, width, height);

          const bg = ctx.createLinearGradient(0, 0, width, height);
          bg.addColorStop(0, "#08090c");
          bg.addColorStop(0.5, "#050506");
          bg.addColorStop(1, "#101217");
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, width, height);

          ctx.globalAlpha = 0.16;
          for (let x = 0; x < width; x += 44) ctx.fillRect(x, 0, 1, height);
          for (let y = 0; y < height; y += 44) ctx.fillRect(0, y, width, 1);
          ctx.globalAlpha = 1;

          ctx.fillStyle = "rgba(157,250,176,0.1)";
          ctx.beginPath();
          ctx.arc(980, 120, 210 + Math.sin(time * 1.4) * 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(244,63,127,0.08)";
          ctx.beginPath();
          ctx.arc(1140, 590, 260 + Math.cos(time * 1.2) * 18, 0, Math.PI * 2);
          ctx.fill();

          fillRound(42, 36, 1196, 648, 26, "rgba(15,17,22,0.82)", "rgba(255,255,255,0.1)");
          fillRound(64, 58, 72, 604, 18, "rgba(255,255,255,0.045)", "rgba(255,255,255,0.08)");
          ctx.fillStyle = "#9dfab0";
          ctx.beginPath();
          ctx.arc(100, 98, 16, 0, Math.PI * 2);
          ctx.fill();
          drawText("Spyda", 162, 94, 26, "#fbfbf7", "700", "Space Grotesk");
          drawText("Design breakdown workspace", 162, 122, 14, "#a5acb9", "700");
          fillRound(1022, 73, 164, 40, 20, "#9dfab0");
          drawText("Generate flyer", 1048, 99, 14, "#07110a", "800");

          fillRound(164, 154, 216, 430, 20, "rgba(255,255,255,0.05)", "rgba(255,255,255,0.1)");
          drawText("Source Flyer", 184, 190, 16, "#fbfbf7", "800");
          const uploadP = appear(time, 0.45, 0.8);
          fillRound(184, 214, 176, 168, 18, `rgba(157,250,176,${0.05 + uploadP * 0.09})`, "rgba(157,250,176,0.24)");
          drawText(uploadP > 0.84 ? "Flyer uploaded" : "Drop reference", 209, 302, 14, uploadP > 0.84 ? "#9dfab0" : "#a5acb9", "800");
          fillRound(184, 408, 176, 42, 21, uploadP > 0.84 ? "#9dfab0" : "rgba(255,255,255,0.08)");
          drawText(time > 1.2 ? "Analyze flyer" : "Waiting", 220, 435, 14, uploadP > 0.84 ? "#07110a" : "#a5acb9", "800");
          drawText("Workflow", 184, 492, 14, "#a5acb9", "800");
          ["Upload reference", "Break into web", "Replace ingredients", "Generate output"].forEach((label, index) => {
            ctx.fillStyle = time > 1 + index * 1.5 ? "#9dfab0" : "rgba(255,255,255,0.18)";
            ctx.beginPath();
            ctx.arc(196, 520 + index * 28, 5, 0, Math.PI * 2);
            ctx.fill();
            drawText(label, 212, 525 + index * 28, 12, "#d8dde7", "700");
          });

          const sourceX = 520;
          const sourceY = 228;
          const sourceW = 190;
          const sourceH = 260;
          const sourceAppear = appear(time, 0.9, 0.8);
          ctx.save();
          ctx.globalAlpha = sourceAppear;
          ctx.translate(sourceX + sourceW / 2, sourceY + sourceH / 2);
          ctx.scale(0.84 + sourceAppear * 0.16, 0.84 + sourceAppear * 0.16);
          fillRound(-sourceW / 2, -sourceH / 2, sourceW, sourceH, 22, "#14161c", "rgba(255,255,255,0.14)");
          const fgrad = ctx.createLinearGradient(-80, -105, 80, 110);
          fgrad.addColorStop(0, "#f43f7f");
          fgrad.addColorStop(1, "#ffcf4d");
          fillRound(-68, -96, 136, 192, 16, fgrad);
          fillRound(-48, -70, 96, 18, 8, "rgba(255,255,255,0.88)");
          fillRound(-44, -30, 58, 62, 14, "rgba(255,255,255,0.72)");
          fillRound(-52, 58, 104, 24, 10, "rgba(255,255,255,0.82)");
          drawText("Source", -34, 128, 14, "#9dfab0", "800");
          ctx.restore();

          nodeData.forEach((node) => {
            const cx = sourceX + sourceW / 2;
            const cy = sourceY + sourceH / 2;
            const tx = node.x + 90;
            const ty = node.y + 48;
            const p = appear(time, node.start - 0.25, 0.7);
            ctx.strokeStyle = "rgba(157,250,176,0.72)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(lerp(cx, tx, p), lerp(cy, ty, p));
            ctx.stroke();
          });

          nodeData.forEach((node) => {
            const p = appear(time, node.start, 0.6);
            ctx.save();
            ctx.globalAlpha = p;
            ctx.translate(node.x + 90, node.y + 48 + Math.sin(time * 2 + node.x) * 2);
            ctx.scale(0.78 + p * 0.22, 0.78 + p * 0.22);
            fillRound(-90, -48, 180, 96, 18, node.fill, node.fill === "#4b4949" ? "rgba(255,255,255,0.18)" : "rgba(17,24,39,0.12)");
            drawText(node.zone, -70, -18, 12, node.fill === "#4b4949" ? "#9dfab0" : "#4b5565", "900");
            drawText(node.label, -70, 8, 18, node.color, "800", "Space Grotesk");
            drawText(node.sub, -70, 32, 12, node.fill === "#4b4949" ? "rgba(255,255,255,0.72)" : "#4b5565", "700");
            if (node.label === "Brand Card") {
              ["#4b4949", "#9dfab0", "#f43f7f"].forEach((color, index) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(-62 + index * 26, 30, 9, 0, Math.PI * 2);
                ctx.fill();
              });
            }
            ctx.restore();
          });

          const cursorP = time < 1.2 ? appear(time, 0.25, 0.8) : time < 4.5 ? appear(time, 1.2, 2.8) : appear(time, 4.5, 2.4);
          const cursorX = time < 1.2 ? lerp(1110, 274, cursorP) : time < 4.5 ? lerp(274, 870, cursorP) : lerp(870, 1104, cursorP);
          const cursorY = time < 1.2 ? lerp(620, 430, cursorP) : time < 4.5 ? lerp(430, 504, cursorP) : lerp(504, 94, cursorP);
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.moveTo(cursorX, cursorY);
          ctx.lineTo(cursorX + 24, cursorY + 10);
          ctx.lineTo(cursorX + 11, cursorY + 16);
          ctx.lineTo(cursorX + 5, cursorY + 31);
          ctx.lineTo(cursorX - 2, cursorY + 29);
          ctx.lineTo(cursorX + 4, cursorY + 14);
          ctx.closePath();
          ctx.fill();

          if (time > 6.35) {
            const p = appear(time, 6.35, 0.7);
            ctx.save();
            ctx.globalAlpha = p;
            fillRound(432, 540, 382, 82, 22, "rgba(157,250,176,0.95)", "rgba(255,255,255,0.2)");
            drawText("Generated flyer ready", 476, 574, 22, "#07110a", "900", "Space Grotesk");
            drawText("New design keeps the reference structure", 476, 600, 13, "#17351f", "800");
            ctx.restore();
          }

          const labels = ["Upload", "Analyze", "Edit atoms", "Generate"];
          const labelIndex = time < 1.8 ? 0 : time < 4.2 ? 1 : time < 6.4 ? 2 : 3;
          fillRound(86, 614, 254, 34, 17, "rgba(255,255,255,0.07)", "rgba(255,255,255,0.09)");
          drawText(labels[labelIndex], 108, 637, 13, "#9dfab0", "900");
          ctx.fillStyle = "rgba(255,255,255,0.16)";
          ctx.fillRect(176, 629, 140, 4);
          ctx.fillStyle = "#9dfab0";
          ctx.fillRect(176, 629, 140 * Math.min(time / duration, 1), 4);

          if (time < duration) requestAnimationFrame(drawFrame);
        };

        const done = new Promise((resolve) => {
          recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: "video/webm" });
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          };
        });

        recorder.start();
        startTime = performance.now();
        requestAnimationFrame(drawFrame);
        await new Promise((resolve) => setTimeout(resolve, duration * 1000 + 240));
        recorder.stop();
        return done;
      };

      window.addEventListener("load", async () => {
        if (window.location.search.includes("save=1")) {
          const dataUrl = await window.createSpydaDemo();
          const response = await fetch("/api/save-demo-video", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dataUrl }),
          });
          document.body.dataset.saved = response.ok ? "true" : "false";
          document.title = response.ok ? "Spyda Demo Saved" : "Spyda Demo Save Failed";
        }
      });
    </script>
  </body>
</html>
