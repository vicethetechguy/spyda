<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up - Spyda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="landing.css" />
  </head>
  <body data-page="signup">
    <header class="site-header promo-header">
      <a class="brand-link" href="index.html" aria-label="Spyda home">
        <img src="assets/spyda-logo-drive.webp" alt="" />
        <span>Spyda</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html#inside" data-nav-link="inside">Inside</a>
        <a href="index.html#examples" data-nav-link="examples">Samples</a>
        <a href="index.html#faq" data-nav-link="faq">FAQ</a>
        <a href="pricing.html" data-nav-link="pricing">Pricing</a>
        <a href="signin.html" data-nav-link="signin">Sign in</a>
      </nav>
      <a class="header-cta active-page-link" href="signup.html" data-nav-link="signup" aria-current="page">Sign up</a>
      <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" aria-expanded="false">
        <span class="hamburger-box">
          <span class="hamburger-inner"></span>
        </span>
      </button>
    </header>

    <div class="mobile-nav-drawer" aria-hidden="true">
      <nav class="mobile-nav-links">
        <a href="index.html#inside" data-nav-link="inside">Inside</a>
        <a href="index.html#examples" data-nav-link="examples">Samples</a>
        <a href="index.html#faq" data-nav-link="faq">FAQ</a>
        <a href="pricing.html" data-nav-link="pricing">Pricing</a>
        <a href="signin.html" data-nav-link="signin">Sign in</a>
      </nav>
    </div>

    <main class="auth-shell">
      <section class="auth-copy">
        <p class="eyebrow">Create account</p>
        <h1>Start turning <em>flyer references</em> into editable webs.</h1>
        <p class="hero-copy">Set up your Spyda workspace, save your brand defaults, and prepare designs for GPT-Image 2 generation.</p>
      </section>

      <form class="auth-card" action="workspace.html">
        <span class="plan-label">Sign up</span>
        <label>
          <span>Full name</span>
          <input type="text" placeholder="Your name" required />
        </label>
        <label>
          <span>Email address</span>
          <input type="email" placeholder="designer@studio.com" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" placeholder="Create password" required />
        </label>
        <button class="primary-action" type="submit">Create workspace</button>
        <p>Already have an account? <a href="signin.html">Sign in</a></p>
      </form>
    </main>
    <script src="assets/spyda-landing.js"></script>
  </body>
</html>
